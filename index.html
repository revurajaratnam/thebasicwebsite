<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websites</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .nav{
            display: flex;
             justify-content: space-around;
             background-color: bisque;
             padding: 10px 1em;
             
        }
        .nav ul{
            display: flex;
            align-content: center;
            list-style: none;
            gap:2em;
            
        }
        .productimage{
            background-image: url(../m1.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            width: 30em;
            height: 22em;
            margin-top: 2em;
            box-shadow: 1px 1px 10px 10px rgba(0, 0, 0, 0.10);
            margin-left: 3em;
        }
        .Mobile{
            display:flex;
            gap:15em;
            margin-left: 4em;
            margin-bottom: 13em;
        }
        .rate{
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <div class="nav">
        <ul>
            <a href=""><li>Home</li></a>
            <a href=""><li>Mobile</li></a>
            <a href=""><li>Laptop</li></a>
            <a href=""><li>Accessories</li></a>
        </ul>
    </div>
    <div class="productimage">
        <div class="Mobile">Redmini Mobile
        <div class="rate">4.5 Rating</div>
        <div class="product content">
        </div>
    </div>
    </div>
</body>
</html>
